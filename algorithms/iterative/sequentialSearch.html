<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sequential Search</title>

    <link rel="stylesheet" href="../../assets/css/theme.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />

    <script src="../../assets/js/copyCode.js"></script>
    <script src="../../assets/js/formatJScode.js"></script>
  </head>
  <body>
    <main>
      <h3>Sequential Search</h3>
      <p>
        Sequential search scans each element in the array from left to right
        until the target is found or the array is exhausted. Time complexity:
        O(n).
      </p>
      <section>
        <code class="javascript">
          <pre id="seq_search"></pre>
        </code>
        <script>
          document.addEventListener("DOMContentLoaded", () => {
            const jsCode = `function sequentialSearch(arr, target) {
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] === target) {
      return i;
    }
  }
  return -1; // target not found
}`;
            const block = document.getElementById("seq_search");
            if (block) {
              block.textContent = jsCode;
              const formatter = new JSCodeFormatter();
              formatter.formatCodeBlock(block);
            }
          });
        </script>
      </section>
    </main>
  </body>
</html>
