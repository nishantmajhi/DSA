<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travelling Salesman</title>

    <link rel="stylesheet" href="../../assets/css/theme.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />

    <script src="../../assets/js/copyCode.js"></script>
    <script src="../../assets/js/formatJScode.js"></script>
  </head>
  <body>
    <main>
      <h3>Travelling Salesman</h3>
      <p>The travelling salesman problem finds the shortest tour that visits every city exactly once and returns to the start. Solved here with dynamic programming and bitmask. Time complexity: O(2ⁿ × n²).</p>
      <section>
        <code class="javascript">
          <pre id="tsp">
          </pre>
        </code>
        <script>
          document.addEventListener("DOMContentLoaded", () => {
            const jsCode = `// dist is an n x n matrix of distances between cities
// returns the minimum cost of a tour starting and ending at city 0
function travelingSalesman(dist) {
  const n = dist.length;
  const VISITED_ALL = (1 << n) - 1;

  // dp[mask][i] = min cost to have visited all cities in mask, currently at city i
  const dp = Array.from({ length: 1 << n }, () =>
    new Array(n).fill(Infinity)
  );

  // start at city 0 with only city 0 visited
  dp[1][0] = 0;

  for (let mask = 1; mask <= VISITED_ALL; mask++) {
    for (let u = 0; u < n; u++) {
      // skip if city u is not in the current visited set
      if (!(mask & (1 << u))) continue;
      if (dp[mask][u] === Infinity) continue;

      for (let v = 0; v < n; v++) {
        // skip if city v has already been visited
        if (mask & (1 << v)) continue;

        const newMask = mask | (1 << v);
        const newCost = dp[mask][u] + dist[u][v];

        if (newCost < dp[newMask][v]) {
          dp[newMask][v] = newCost;
        }
      }
    }
  }

  // find the minimum cost tour returning to city 0
  let minCost = Infinity;
  for (let u = 1; u < n; u++) {
    const cost = dp[VISITED_ALL][u] + dist[u][0];
    if (cost < minCost) {
      minCost = cost;
    }
  }

  return minCost;
}`;
            const block = document.getElementById("tsp");
            if (block) {
              block.textContent = jsCode;
              const formatter = new JSCodeFormatter();
              formatter.formatCodeBlock(block);
            }
          });
        </script>
      </section>
    </main>
  </body>
</html>
