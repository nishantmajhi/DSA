<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binary Search</title>

    <link rel="stylesheet" href="../../assets/css/theme.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />

    <script src="../../assets/js/copyCode.js"></script>
    <script src="../../assets/js/formatJScode.js"></script>
  </head>
  <body>
    <main>
      <h3>Binary Search</h3>
      <p>Binary search repeatedly halves the search space by comparing the target against the middle element of a sorted array. Time complexity: O(log n).</p>
      <section>
        <code class="javascript">
          <pre id="binary_search">
          </pre>
        </code>
        <script>
          document.addEventListener("DOMContentLoaded", () => {
            const jsCode = `// arr must be sorted in ascending order
function binarySearch(arr, target, low, high) {
  low = low === undefined ? 0 : low;
  high = high === undefined ? arr.length - 1 : high;

  if (low > high) {
    // target not found
    return -1;
  }

  const mid = Math.floor((low + high) / 2);

  if (arr[mid] === target) {
    return mid;
  } else if (arr[mid] < target) {
    // discard left half
    return binarySearch(arr, target, mid + 1, high);
  } else {
    // discard right half
    return binarySearch(arr, target, low, mid - 1);
  }
}`;
            const block = document.getElementById("binary_search");
            if (block) {
              block.textContent = jsCode;
              const formatter = new JSCodeFormatter();
              formatter.formatCodeBlock(block);
            }
          });
        </script>
      </section>
    </main>
  </body>
</html>
