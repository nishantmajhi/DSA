<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huffman Encoding</title>

    <link rel="stylesheet" href="../../assets/css/theme.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />

    <script src="../../assets/js/copyCode.js"></script>
    <script src="../../assets/js/formatJScode.js"></script>
  </head>
  <body>
    <main>
      <h3>Huffman Encoding</h3>
      <p>Huffman encoding builds an optimal prefix-free binary code by iteratively merging the two nodes with the lowest frequencies. Commonly used in lossless data compression.</p>
      <section>
        <code class="javascript">
          <pre id="huffman">
          </pre>
        </code>
        <script>
          document.addEventListener("DOMContentLoaded", () => {
            const jsCode = `class HuffmanNode {
  constructor(char, freq) {
    this.char = char;
    this.freq = freq;
    this.left = null;
    this.right = null;
  }
}

// charFreqs is an array of { char, freq } objects
function huffman(charFreqs) {
  // build initial list sorted by frequency
  const nodes = charFreqs.map((cf) => new HuffmanNode(cf.char, cf.freq));
  nodes.sort((a, b) => a.freq - b.freq);

  while (nodes.length > 1) {
    // take the two nodes with the lowest frequency
    const left = nodes.shift();
    const right = nodes.shift();

    // create an internal node combining their frequencies
    const internal = new HuffmanNode(null, left.freq + right.freq);
    internal.left = left;
    internal.right = right;

    // insert back and keep sorted
    nodes.push(internal);
    nodes.sort((a, b) => a.freq - b.freq);
  }

  const codes = {};
  generateCodes(nodes[0], "", codes);

  return codes;
}

function generateCodes(node, code, codes) {
  if (node === null) return;

  if (node.char !== null) {
    // leaf node — assign code (use "0" for single-character input)
    codes[node.char] = code || "0";
    return;
  }

  generateCodes(node.left, code + "0", codes);
  generateCodes(node.right, code + "1", codes);
}`;
            const block = document.getElementById("huffman");
            if (block) {
              block.textContent = jsCode;
              const formatter = new JSCodeFormatter();
              formatter.formatCodeBlock(block);
            }
          });
        </script>
      </section>
    </main>
  </body>
</html>
